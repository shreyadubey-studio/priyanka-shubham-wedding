<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priyanka & Shubham — Premium Wedding App</title>
  <style>
    :root {
      --bg: #1C1020;
      --bg-2: #25152a;
      --panel: rgba(255,255,255,0.05);
      --panel-2: rgba(255,255,255,0.07);
      --panel-3: rgba(255,255,255,0.03);
      --line: rgba(196,168,130,0.18);
      --line-strong: rgba(196,168,130,0.34);
      --text: #f6efe6;
      --muted: rgba(246,239,230,0.58);
      --soft: rgba(246,239,230,0.36);
      --gold: #C4A882;
      --gold-soft: rgba(196,168,130,0.16);
      --gold-glow: rgba(196,168,130,0.24);
      --success: #9fb88d;
      --warn: #d7b782;
      --danger: #cb8f8f;
      --shadow-lg: 0 24px 80px rgba(0,0,0,0.34);
      --shadow-md: 0 10px 30px rgba(0,0,0,0.24);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --nav-h: 64px;
      --bottom-h: 68px;
      --maxw: 1240px;
    }

    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; background: radial-gradient(circle at top left, rgba(196,168,130,0.10), transparent 26%), radial-gradient(circle at top right, rgba(255,255,255,0.04), transparent 22%), linear-gradient(180deg, #170d1b 0%, #1C1020 100%); color: var(--text); font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; min-height:100%; }
    body { letter-spacing: 0.01em; }
    a { color: inherit; text-decoration: none; }
    button, input, textarea, select { font: inherit; }

    .app-shell { max-width: var(--maxw); margin: 0 auto; min-height: 100vh; }

    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid var(--line);
      box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }

    .neuro {
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(0,0,0,0.12));
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.05), inset -1px -1px 0 rgba(0,0,0,0.18), var(--shadow-md);
    }

    .hidden { display:none !important; }
    .muted { color: var(--muted); }
    .soft { color: var(--soft); }

    .screen {
      display:none;
      min-height:100vh;
    }
    .screen.active { display:block; }

    /* Login */
    .login-wrap {
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
    }
    .login-panel {
      width:min(460px, 100%);
      border-radius: 32px;
      padding: 24px;
      position: relative;
    }
    .lang-row {
      display:flex;
      justify-content:flex-end;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 34px;
    }
    .lang-row .active { color: var(--gold); }
    .brand-block {
      text-align:center;
      margin-bottom: 32px;
    }
    .brand-name {
      font-size: clamp(36px, 8vw, 54px);
      line-height: 1.02;
      font-weight: 250;
      letter-spacing: 0.01em;
    }
    .brand-amp { color: var(--gold); font-weight: 300; }
    .brand-sub { margin-top: 18px; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); }
    .brand-date { margin-top: 10px; color: var(--soft); font-size: 13px; }
    .auth-tabs {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 6px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      margin-bottom: 18px;
    }
    .auth-tab {
      border:none;
      background: transparent;
      color: var(--muted);
      padding: 12px 14px;
      border-radius: 12px;
      cursor:pointer;
      transition: all .22s ease;
    }
    .auth-tab.active {
      background: linear-gradient(180deg, rgba(196,168,130,0.18), rgba(196,168,130,0.08));
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .field { margin-bottom: 12px; }
    .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 7px; }
    .input, .textarea, .select {
      width:100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(196,168,130,0.16);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 14px;
      outline: none;
      transition: border-color .2s ease, background .2s ease, box-shadow .2s ease;
    }
    .input:focus, .textarea:focus, .select:focus {
      border-color: rgba(196,168,130,0.48);
      background: rgba(255,255,255,0.055);
      box-shadow: 0 0 0 4px rgba(196,168,130,0.08);
    }
    .textarea { min-height: 100px; resize: vertical; }
    .btn-row { display:flex; gap: 10px; margin-top: 16px; }
    .btn {
      appearance:none;
      border:none;
      border-radius: 14px;
      padding: 14px 18px;
      cursor:pointer;
      transition: transform .18s ease, opacity .2s ease, background .2s ease, border-color .2s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: linear-gradient(180deg, rgba(196,168,130,0.24), rgba(196,168,130,0.12));
      color: var(--text);
      border: 1px solid rgba(196,168,130,0.34);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 30px rgba(0,0,0,0.18);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      border: 1px solid var(--line);
    }
    .btn-link {
      background:none; border:none; padding:0; color: var(--gold); cursor:pointer;
    }
    .full { width:100%; }
    .login-meta { margin-top: 14px; display:flex; justify-content:space-between; align-items:center; font-size:12px; color: var(--muted); }
    .auth-note { margin-top: 14px; font-size: 12px; color: var(--soft); line-height:1.6; }
    .error { color: #f0b9b9; font-size: 12px; min-height: 18px; margin-top:8px; }

    /* App shell */
    .topbar {
      position: sticky;
      top:0;
      z-index: 50;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 16px;
      height: var(--nav-h);
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(28,16,32,0.72);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }
    .topbar-left { display:flex; align-items:center; gap:14px; min-width:0; }
    .topbar-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; }
    .notif-btn, .avatar-btn, .back-btn {
      width: 40px; height:40px; border-radius: 12px; border:1px solid var(--line); background: rgba(255,255,255,0.04); color: var(--text); display:grid; place-items:center; cursor:pointer;
    }
    .avatar-btn { width:auto; padding:0 12px; gap:10px; display:flex; }
    .notif-wrap { position: relative; }
    .notif-badge {
      position:absolute; top:-4px; right:-4px; min-width: 18px; height:18px; border-radius: 999px; background: var(--gold); color: #221417; font-size: 11px; font-weight:700; display:grid; place-items:center; padding:0 5px; border: 2px solid var(--bg);
    }
    .notif-panel {
      position:absolute; right:0; top:48px; width:min(360px, calc(100vw - 32px)); max-height: 360px; overflow:auto; border-radius: 18px; padding:10px; display:none;
    }
    .notif-item { padding: 12px; border-radius: 12px; border:1px solid transparent; cursor:pointer; }
    .notif-item + .notif-item { margin-top: 8px; }
    .notif-item.unread { background: rgba(196,168,130,0.08); border-color: rgba(196,168,130,0.18); }
    .notif-item .meta { font-size: 11px; color: var(--muted); margin-top: 6px; }

    .page-wrap {
      padding: 18px 18px calc(var(--bottom-h) + 28px);
    }

    .hero {
      padding: 16px 0 22px;
      display:grid;
      grid-template-columns: 1.3fr .8fr;
      gap: 18px;
    }
    .hero-panel { border-radius: 28px; padding: 28px; overflow:hidden; position:relative; }
    .hero-panel::before {
      content:""; position:absolute; inset:0; background: radial-gradient(circle at 15% 15%, rgba(196,168,130,0.12), transparent 28%), radial-gradient(circle at 85% 25%, rgba(255,255,255,0.06), transparent 24%); pointer-events:none;
    }
    .hero-title { font-size: clamp(36px, 8vw, 64px); line-height: .96; font-weight: 260; max-width: 620px; }
    .hero-title .amp { color: var(--gold); }
    .hero-sub { margin-top: 18px; color: var(--muted); max-width: 520px; line-height: 1.7; }
    .hero-meta { margin-top: 22px; display:flex; flex-wrap:wrap; gap: 10px; }
    .chip {
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }
    .quick-grid {
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .quick-cell {
      border-radius: 20px;
      padding: 18px;
      min-height: 118px;
    }
    .mini-label { font-size: 11px; text-transform: uppercase; letter-spacing:.15em; color: var(--muted); }
    .mini-value { font-size: 28px; margin-top: 16px; font-weight: 320; }
    .mini-sub { margin-top: 8px; font-size: 12px; color: var(--muted); }

    .section-head {
      display:flex; align-items:end; justify-content:space-between; gap: 12px; margin: 14px 0 18px;
    }
    .section-kicker { font-size: 11px; text-transform: uppercase; letter-spacing: .18em; color: var(--muted); }
    .section-title { font-size: clamp(24px, 4vw, 34px); font-weight: 320; margin-top: 6px; }
    .section-desc { margin-top: 8px; color: var(--muted); max-width: 640px; line-height: 1.6; }

    .rows {
      border-top: 1px solid var(--line);
    }
    .row-item {
      display:grid;
      grid-template-columns: 56px 1fr auto;
      gap: 14px;
      align-items:center;
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
      cursor:pointer;
      transition: background .18s ease;
    }
    .row-item:hover { background: rgba(255,255,255,0.018); }
    .row-number { color: var(--gold); font-size: 14px; }
    .row-title { font-size: 20px; font-weight: 360; }
    .row-subtitle { color: var(--muted); margin-top: 4px; }
    .row-meta { margin-top: 8px; color: var(--soft); font-size: 13px; }
    .row-arrow { color: var(--gold); font-size: 18px; }

    .filter-bar {
      display:flex; gap:10px; overflow:auto; padding-bottom: 8px; margin-bottom: 14px;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display:none; }
    .filter-chip {
      white-space: nowrap;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      cursor:pointer;
    }
    .filter-chip.active {
      color: var(--text);
      border-color: rgba(196,168,130,0.38);
      background: rgba(196,168,130,0.12);
    }

    .song-list { border-top: 1px solid var(--line); }
    .song-row {
      display:grid;
      grid-template-columns: 40px 1fr auto;
      gap: 12px;
      padding: 16px 0;
      border-bottom:1px solid var(--line);
      align-items:start;
    }
    .song-idx { color: var(--gold); font-size: 13px; padding-top: 2px; }
    .song-name { font-size: 18px; font-weight: 360; }
    .song-meta { margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.75; }
    .song-links { margin-top: 10px; display:flex; flex-wrap:wrap; gap:8px; }
    .text-link {
      padding: 8px 10px; border:1px solid var(--line); border-radius: 999px; color: var(--gold); font-size: 12px;
      background: rgba(255,255,255,0.025);
    }
    .status { font-size: 12px; padding: 8px 10px; border-radius: 999px; border:1px solid var(--line); white-space: nowrap; }
    .status.ready { color: var(--success); border-color: rgba(159,184,141,0.3); background: rgba(159,184,141,0.08); }
    .status.progress { color: var(--warn); border-color: rgba(215,183,130,0.3); background: rgba(215,183,130,0.08); }
    .status.tbu { color: var(--muted); }

    .split {
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 18px;
    }
    .panel {
      border-radius: 26px;
      padding: 22px;
    }

    .task-head { display:flex; align-items:center; justify-content:space-between; gap: 12px; margin-bottom: 8px; }
    .task-group { padding: 16px 0; border-bottom: 1px solid var(--line); }
    .task-top { display:grid; grid-template-columns: 1fr auto; gap: 16px; align-items:center; }
    .person-name { font-size: 18px; font-weight: 360; }
    .progress-wrap { display:flex; align-items:center; gap: 10px; }
    .progress-bar { width: 140px; height: 8px; border-radius: 999px; background: rgba(255,255,255,0.06); overflow:hidden; border:1px solid rgba(255,255,255,0.02); }
    .progress-fill { height:100%; background: linear-gradient(90deg, rgba(196,168,130,0.6), var(--gold)); }
    .progress-text { font-size: 12px; color: var(--muted); min-width: 40px; text-align:right; }
    .task-item { display:grid; grid-template-columns: 52px 1fr; gap: 12px; padding: 12px 0 0; }
    .task-state { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
    .task-title { font-size: 15px; }
    .task-sub { color: var(--muted); font-size: 13px; margin-top: 6px; }

    .role-list, .team-list, .suggest-list, .chat-list {
      border-top:1px solid var(--line);
    }
    .simple-row {
      padding: 16px 0;
      border-bottom:1px solid var(--line);
    }
    .simple-title { font-size: 16px; font-weight: 360; }
    .simple-sub { margin-top: 6px; color: var(--muted); font-size: 13px; line-height:1.65; }
    .simple-meta { margin-top: 10px; color: var(--soft); font-size:12px; }

    .composer {
      margin-top: 14px;
      display:grid;
      gap: 10px;
    }
    .inline-actions { display:flex; gap:10px; flex-wrap:wrap; }

    .event-shell { max-width: 980px; }
    .detail-head { display:flex; align-items:flex-start; justify-content:space-between; gap: 20px; margin-bottom: 16px; }
    .detail-title { font-size: clamp(28px, 6vw, 42px); line-height:1; font-weight: 300; }
    .detail-subtitle { margin-top: 10px; color: var(--muted); font-size: 18px; }
    .detail-meta { margin-top: 18px; color: var(--soft); line-height: 1.8; }
    .steps-box {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
    }
    .steps-toggle { display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
    .steps-list { display:none; margin-top: 14px; }
    .steps-list.open { display:block; }
    .step { padding: 10px 0; color: var(--muted); border-bottom: 1px dashed rgba(255,255,255,0.06); }
    .step:last-child { border-bottom:none; }

    .gallery-grid {
      display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;
    }
    .gallery-tile {
      min-height: 180px; border-radius: 18px; border:1px solid var(--line); background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.025)); display:flex; align-items:end; padding:14px;
    }

    .skeleton {
      position:relative;
      overflow:hidden;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    .skeleton::after {
      content:"";
      position:absolute; inset:0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }

    .bottom-nav {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: var(--bottom-h);
      border-top: 1px solid var(--line);
      background: rgba(28,16,32,0.86);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      z-index: 60;
    }
    .bottom-scroll {
      max-width: var(--maxw);
      margin: 0 auto;
      display:flex; align-items:center; gap: 18px;
      height:100%; padding: 0 18px; overflow:auto; scrollbar-width:none;
    }
    .bottom-scroll::-webkit-scrollbar { display:none; }
    .nav-item {
      color: var(--muted);
      white-space: nowrap;
      position: relative;
      padding: 0 2px 12px;
      cursor:pointer;
      font-size: 14px;
    }
    .nav-item.active { color: var(--text); }
    .nav-item.active::after {
      content:""; position:absolute; left:0; right:0; bottom:4px; height: 2px; border-radius: 999px; background: var(--gold);
    }

    .wa-banner {
      margin-top: 18px;
      display:flex; gap: 12px; align-items:center; justify-content:space-between; flex-wrap: wrap;
      padding: 14px 16px; border-radius: 18px; border:1px solid var(--line); background: rgba(255,255,255,0.03);
    }

    .empty-note { padding: 26px 0; color: var(--muted); }

    .desktop-only { display:block; }
    .mobile-only { display:none; }

    @media (max-width: 980px) {
      .hero, .split { grid-template-columns: 1fr; }
      .quick-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 720px) {
      .gallery-grid { grid-template-columns: 1fr 1fr; }
      .quick-grid { grid-template-columns: 1fr 1fr; }
      .row-item { grid-template-columns: 34px 1fr auto; }
      .hero-panel, .panel { padding: 18px; }
      .page-wrap { padding-left: 14px; padding-right: 14px; }
      .topbar { padding: 0 12px; }
      .desktop-only { display:none; }
      .mobile-only { display:block; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <section id="screen-login" class="screen active">
      <div class="login-wrap">
        <div class="login-panel glass neuro">
          <div class="lang-row">
            <button class="btn-link active" onclick="setLanguage('en')">EN</button>
            <button class="btn-link" onclick="setLanguage('hi')">हि</button>
          </div>

          <div class="brand-block">
            <div class="brand-name">Priyanka<br><span class="brand-amp">&</span><br>Shubham</div>
            <div class="brand-sub">Vivah Utsav</div>
            <div class="brand-date">1 – 3 July 2025 · Raipur</div>
          </div>

          <div class="auth-tabs">
            <button id="tab-login" class="auth-tab active" onclick="setAuthMode('login')">Login</button>
            <button id="tab-join" class="auth-tab" onclick="setAuthMode('join')">Join Team</button>
          </div>

          <div class="field">
            <div class="label">Username</div>
            <input id="auth-username" class="input" placeholder="Username" />
          </div>
          <div class="field">
            <div class="label">Password</div>
            <input id="auth-password" class="input" type="password" placeholder="Password" />
          </div>
          <div id="join-whatsapp-field" class="field hidden">
            <div class="label">Registered WhatsApp Number</div>
            <input id="auth-whatsapp" class="input" placeholder="WhatsApp number" />
          </div>

          <div class="btn-row">
            <button id="auth-submit" class="btn btn-primary full" onclick="submitAuth()">Enter</button>
          </div>
          <div class="btn-row">
            <button class="btn btn-secondary full" onclick="continueAsGuest()">Continue as Guest</button>
          </div>

          <div class="login-meta">
            <button class="btn-link" onclick="openForgotPassword()">Forgot password</button>
            <span>Private team access</span>
          </div>
          <div id="auth-error" class="error"></div>
          <div class="auth-note">Luxury planning interface with rehearsal tracking, planning timelines, event detail pages, mentions, notifications, and WhatsApp coordination.</div>
        </div>
      </div>
    </section>

    <section id="screen-app" class="screen">
      <header class="topbar">
        <div class="topbar-left">
          <button id="back-btn" class="back-btn hidden" onclick="goBack()">←</button>
          <div>
            <div class="topbar-sub" id="topbar-kicker">Wedding Operations</div>
            <div class="topbar-title" id="topbar-title">Dashboard</div>
          </div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="notif-wrap">
            <button class="notif-btn" onclick="toggleNotifications()">@</button>
            <div id="notif-badge" class="notif-badge hidden">0</div>
            <div id="notif-panel" class="notif-panel glass"></div>
          </div>
          <button id="wa-top-btn" class="avatar-btn" onclick="openWhatsAppGroup()">
            <span>WA</span>
          </button>
          <button class="avatar-btn" onclick="logout()">
            <span id="current-user">Guest</span>
          </button>
        </div>
      </header>

      <main class="page-wrap">
        <div id="page-dashboard" class="page"></div>
        <div id="page-events" class="page hidden"></div>
        <div id="page-event-detail" class="page hidden"></div>
        <div id="page-rehearsal" class="page hidden"></div>
        <div id="page-plan" class="page hidden"></div>
        <div id="page-roles" class="page hidden"></div>
        <div id="page-team" class="page hidden"></div>
        <div id="page-gallery" class="page hidden"></div>
        <div id="page-suggest" class="page hidden"></div>
        <div id="page-chat" class="page hidden"></div>
        <div id="page-info" class="page hidden"></div>
      </main>

      <nav class="bottom-nav">
        <div class="bottom-scroll" id="bottom-nav"></div>
      </nav>
    </section>
  </div>

    function setAuthMode(mode) {
      state.authMode = mode;

      document.getElementById('join-whatsapp-field').classList.toggle('hidden', mode !== 'join');
      document.getElementById('auth-submit').textContent = mode === 'login' ? 'Enter' : 'Join Team';
      document.getElementById('auth-error').textContent = '';

    function submitAuth() {
      const username = document.getElementById('auth-username').value.trim().toLowerCase();
      const password = document.getElementById('auth-password').value.trim();
      const whatsapp = document.getElementById('auth-whatsapp').value.trim();
      const error = document.getElementById('auth-error');
      error.textContent = '';

      if (!username || !password) {
        error.textContent = 'Please enter username and password.';
        return;
      }

      if (state.authMode === 'login') {
        const user = state.users.find(u => u.username === username && u.password === password);
        if (!user) {
          error.textContent = 'Invalid login.';
          return;
        }
        loginUser(user);
        return;
      }

      if (!whatsapp) {
        error.textContent = 'Please enter registered WhatsApp number.';
        return;
      }

      const exists = state.users.find(u => u.username === username);
      if (exists) {
        error.textContent = 'Username already exists.';
        return;
      }

      const newUser = { username, password, whatsapp, name: titleCase(username), role: 'Team Member' };
      state.users.push(newUser);
      loginUser(newUser);
    }

      const whatsapp = prompt('Enter registered WhatsApp number');
      if (!whatsapp) return;
      const user = state.users.find(u => u.username === username.trim().toLowerCase() && u.whatsapp === whatsapp.trim());
      if (!user) {
        alert('Verification failed.');
        return;
      }
      const newPassword = prompt('Set new password');
      if (!newPassword) return;
      user.password = newPassword.trim();
      alert('Password reset complete.');

    }

    function renderRehearsal() {
      const page = document.getElementById('page-rehearsal');
      const filters = ['All', 'Mehndi', 'Sangeet', 'Baraat', 'Reception'];
      let songs = [];
      state.events.forEach(e => {
        if (['mehndi','sangeet','baraat','reception'].includes(e.key)) {
          e.songs.forEach(s => songs.push({ ...s, event: capitalize(e.key) }));
        }
      });
      if (state.currentRehearsalFilter !== 'All') songs = songs.filter(s => s.event === state.currentRehearsalFilter);
      songs.sort((a,b) => a.event.localeCompare(b.event) || a.seq - b.seq);

      const grouped = songs.reduce((acc, item) => {
        acc[item.event] ||= [];
        acc[item.event].push(item);
        return acc;
      }, {});

      page.innerHTML = `
        <section>
          <div class="section-head">
            <div>
              <div class="section-kicker">Members</div>
              <div class="section-title">Rehearsal</div>
              <div class="section-desc">All songs listed in sequence with status, dancers, duration, reference video, and practice track.</div>
            </div>
          </div>
          <div class="filter-bar">
            ${filters.map(f => `<button class="filter-chip ${state.currentRehearsalFilter===f?'active':''}" onclick="setRehearsalFilter('${f}')">${f}</button>`).join('')}
          </div>
          ${Object.keys(grouped).length ? Object.entries(grouped).map(([event, rows]) => `
            <div style="margin-top:18px;">
              <div class="section-kicker">${event}</div>
              <div class="song-list">
                ${rows.map(songRow).join('')}
              </div>
            </div>
          `).join('') : '<div class="empty-note">No songs for this filter.</div>'}
        </section>
      `;
    }

    function setRehearsalFilter(filter) {
      state.currentRehearsalFilter = filter;
      renderRehearsal();
    }

    function renderPlanning() {
      const page = document.getElementById('page-plan');
      page.innerHTML = `
        <section>
          <div class="section-head">
            <div>
              <div class="section-kicker">Coordination</div>
              <div class="section-title">Planning</div>
              <div class="section-desc">Preparation grouped by cousin with progress bars, due dates, and coordination notes.</div>
            </div>
            <button class="btn btn-primary" onclick="addTask()">Add Task</button>
          </div>
          <div class="panel glass">
            ${state.planning.map(person => `
              <div class="task-group">
                <div class="task-top">
                  <div class="person-name">${person.name}</div>
                  <div class="progress-wrap">
                    <div class="progress-bar"><div class="progress-fill" style="width:${person.progress}%"></div></div>
                    <div class="progress-text">${person.progress}%</div>
                  </div>
                </div>
                ${person.tasks.map(task => `
                  <div class="task-item">
                    <div class="task-state">${task.state}</div>
                    <div>
                      <div class="task-title">${task.title}</div>
                      <div class="task-sub">${task.sub}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function addTask() {
      const person = prompt('Assign task to which person?');
      if (!person) return;
      const title = prompt('Task title');
      if (!title) return;
      const due = prompt('Due note');
      const entry = state.planning.find(p => p.name.toLowerCase() === person.toLowerCase());
      if (!entry) {
        alert('Person not found in current planning groups.');
        return;
      }
      entry.tasks.push({ state: 'todo', title, sub: due || 'No date set' });
      renderPlanning();
    }

    function renderRoles() {
      const page = document.getElementById('page-roles');
      page.innerHTML = `
        <section>
          <div class="section-head">
            <div>
              <div class="section-kicker">Family roles</div>
              <div class="section-title">Roles</div>
              <div class="section-desc">Soft role language with clear planning ownership and coordination support.</div>
            </div>
          </div>
          <div class="role-list">
            ${state.roles.map(role => `
              <div class="simple-row">
                <div class="simple-title">${role.title}</div>
                <div class="simple-sub">${role.desc}</div>
                <div class="simple-meta">${role.meta}</div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function renderTeam() {
      const page = document.getElementById('page-team');
      page.innerHTML = `
        <section>
          <div class="section-head">
            <div>
              <div class="section-kicker">Active members</div>
              <div class="section-title">Team</div>
              <div class="section-desc">Core family and planning members with focused ownership.</div>
            </div>
          </div>
          <div class="team-list">
            ${state.team.map(member => `
              <div class="simple-row">
                <div class="simple-title">${member.name}</div>
                <div class="simple-sub">${member.role}</div>
                <div class="simple-meta">${member.note}</div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function renderGallery() {
      const page = document.getElementById('page-gallery');
      page.innerHTML = `
        <section>
          <div class="section-head">
            <div>
              <div class="section-kicker">Media</div>
              <div class="section-title">Gallery</div>
              <div class="section-desc">A cleaner media surface for event-linked captures and review.</div>
            </div>
          </div>
          <div class="gallery-grid">
            <div class="gallery-tile skeleton"><div>Mehndi previews</div></div>
            <div class="gallery-tile skeleton"><div>Sangeet reference stills</div></div>
            <div class="gallery-tile skeleton"><div>Outfit review board</div></div>
          </div>
        </section>
      `;
    }

    function renderSuggest() {
      const page = document.getElementById('page-suggest');
      page.innerHTML = `
        <section>
          <div class="section-head">
            <div>
              <div class="section-kicker">Suggestions</div>
              <div class="section-title">Suggest</div>
              <div class="section-desc">Tag members directly. Tagged members receive a top navigation alert.</div>
            </div>
          </div>
          <div class="composer panel glass">
            <div class="field">
              <div class="label">Suggestion</div>
              <textarea id="suggest-input" class="textarea" placeholder="Write a planning note. Use @username for mentions."></textarea>
            </div>
            <div class="inline-actions">
              <button class="btn btn-primary" onclick="postSuggestion()">Post Suggestion</button>
            </div>
          </div>
          <div class="suggest-list">
            ${state.suggestions.map(item => `
              <div class="simple-row">
                <div class="simple-title">${item.author}</div>
                <div class="simple-sub">${item.text}</div>
                <div class="simple-meta">${item.time}</div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function postSuggestion() {
      const textarea = document.getElementById('suggest-input');
      const text = textarea.value.trim();
      if (!text) return;
      const mentions = extractMentions(text);
      state.suggestions.unshift({ author: state.currentUser?.name || 'Guest', text, time: 'Now', mentions });
      createNotificationsFromMentions(mentions, `tagged in suggestions: ${truncate(text, 64)}`, { page: 'suggest' });
      textarea.value = '';
      renderSuggest();
      updateNotifications();
    }

    function renderChat() {
      const page = document.getElementById('page-chat');
      page.innerHTML = `
        <section>
          <div class="section-head">
            <div>
              <div class="section-kicker">Team coordination</div>
              <div class="section-title">Chat</div>
              <div class="section-desc">Mention-driven conversation for quick coordination. Notifications surface in the top bar.</div>
            </div>
          </div>
          <div class="composer panel glass">
            <div class="field">
              <div class="label">Message</div>
              <textarea id="chat-input" class="textarea" placeholder="Write a message. Use @username for mentions."></textarea>
            </div>
            <div class="inline-actions">
              <button class="btn btn-primary" onclick="postChat()">Send Message</button>
            </div>
          </div>
          <div class="chat-list">
            ${state.chats.map(item => `
              <div class="simple-row">
                <div class="simple-title">${item.author}</div>
                <div class="simple-sub">${item.text}</div>
                <div class="simple-meta">${item.time}</div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    function postChat() {
      const textarea = document.getElementById('chat-input');
      const text = textarea.value.trim();
      if (!text) return;
      const mentions = extractMentions(text);
      state.chats.unshift({ author: state.currentUser?.name || 'Guest', text, time: 'Now', mentions });
      createNotificationsFromMentions(mentions, `tagged in chat: ${truncate(text, 64)}`, { page: 'chat' });
      textarea.value = '';
      renderChat();
      updateNotifications();
    }

    function renderInfo() {
      const page = document.getElementById('page-info');
      page.innerHTML = `
        <section>
          <div class="section-head">
            <div>
              <div class="section-kicker">Reference</div>
              <div class="section-title">Info</div>
              <div class="section-desc">Venue, navigation, checklist, and system notes for the premium experience.</div>
            </div>
          </div>
          <div class="split">
            <div class="panel glass">
              <div class="simple-title">Primary venue</div>
              <div class="simple-sub">Royal Club, Raipur</div>
              <div class="simple-meta">Sequence-corrected events and rehearsal mapping</div>
            </div>
            <div class="panel glass">
              <div class="simple-title">Design system</div>
              <div class="simple-sub">Dark mauve background, champagne gold accents, Swiss-style spacing, restrained glass layers.</div>
              <div class="simple-meta">No decorative symbols</div>
            </div>
          </div>
        </section>
      `;
    }

    function extractMentions(text) {
      const matches = [...text.matchAll(/@([a-zA-Z0-9_]+)/g)].map(m => m[1].toLowerCase());
      return [...new Set(matches)].filter(u => state.users.some(x => x.username === u));
    }

    function createNotificationsFromMentions(mentions, text, target) {
      mentions.forEach(username => {
        state.notifications.unshift({
          id: Date.now() + Math.random(),
          user: username,
          text: `@${username} ${text}`,
          target,
          read: false,
          time: 'Now'
        });
      });
    }

    function getUnreadCount() {
      if (!state.currentUser) return 0;
      return state.notifications.filter(n => n.user === state.currentUser.username && !n.read).length;
    }

    function updateNotifications() {
      const badge = document.getElementById('notif-badge');
      const panel = document.getElementById('notif-panel');
      const username = state.currentUser?.username;
      const items = state.notifications.filter(n => n.user === username);
      const unread = items.filter(n => !n.read).length;
      badge.textContent = unread;
      badge.classList.toggle('hidden', unread === 0);
      panel.innerHTML = items.length ? items.map(n => `
        <div class="notif-item ${n.read ? '' : 'unread'}" onclick="openNotification('${n.id}')">
          <div>${n.text}</div>
          <div class="meta">${n.time}</div>
        </div>
      `).join('') : '<div class="notif-item">No notifications</div>';
    }

    function toggleNotifications() {
      const panel = document.getElementById('notif-panel');
      const showing = panel.style.display === 'block';
      panel.style.display = showing ? 'none' : 'block';
      state.notificationsOpen = !showing;
    }

    function openNotification(id) {
      const note = state.notifications.find(n => String(n.id) === String(id));
      if (!note) return;
      note.read = true;
      updateNotifications();
      document.getElementById('notif-panel').style.display = 'none';
      if (note.target?.page) setPage(note.target.page);
    }

    function openWhatsAppGroup() {
      window.open(state.whatsappGroupUrl, '_blank');
    }

    function titleCase(text) {
      return text.replace(/\b\w/g, c => c.toUpperCase());
    }

    function capitalize(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function truncate(text, n) {
      return text.length <= n ? text : text.slice(0, n - 1) + '…';
    }

    // initial render for app pages so first login is instant
    renderNav();
    renderAll();
  </script>
</body>
</html>
