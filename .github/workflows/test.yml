name: Test HTML

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-html:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install html5validator
        run: pip install html5validator
      - name: Validate HTML files
        run: html5validator --root . --also-check-css --log INFO

  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check for broken internal references
        run: |
          echo "Checking HTML files exist and are well-formed..."
          for f in $(find . -name '*.html' -not -path './.git/*'); do
            echo "Checking: $f"
            head -1 "$f" | grep -qi 'doctype' || echo "WARNING: $f missing DOCTYPE"
          done
          echo "All HTML files checked!"
